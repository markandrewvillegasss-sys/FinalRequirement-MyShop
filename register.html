<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - MyShop</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="images/logo.png" alt="MyShop Logo">
      <h1>MyShop</h1>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="products.html">Products</a>
      <a href="contact.html">Contact Us</a>
      <a href="register.html">Register</a>
      <a href="login.html">Login</a>
      <a href="checkout.html">Checkout</a>
    </nav>
  </header>

  <section class="register">
    <h2>Create Your Account</h2>
    <form action="#" method="post" class="register-form">
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname" required>

      <label for="birthday">Birthday</label>
      <input type="date" id="birthday" name="birthday" required>

      <label for="gender">Gender</label>
      <select id="gender" name="gender" required>
        <option value="">Select</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>

      <label for="address">Address</label>
      <textarea id="address" name="address" rows="3" required></textarea>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" pattern="[0-9]{11}" placeholder="09XXXXXXXXX" required>

      <label for="username">Username</label>
      <input type="text" id="username" name="username" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" minlength="6" required>

      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" name="confirm" minlength="6" required>

      <div class="form-buttons">
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
      </div>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 MyShop. All rights reserved.</p>
    <div class="social-icons">
      <img src="images/facebook.png" alt="Facebook">
      <img src="images/twitter.png" alt="Twitter">
      <img src="images/instagram.png" alt="Instagram">
    </div>
  </footer>
</body>
</html>
